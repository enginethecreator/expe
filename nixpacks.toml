# Railway build config
# python3 is included automatically when Railway detects requirements.txt
# ffmpeg  — required for merging video+audio streams and mp3 extraction
# nodejs  — required by bgutil-ytdlp-pot-provider script mode to generate PO tokens

[phases.setup]
nixPkgs = ['ffmpeg', 'nodejs']

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "mkdir -p downloads"
]

[start]
cmd = "uvicorn app:app --host 0.0.0.0 --port ${PORT:-8080}"

